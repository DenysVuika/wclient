name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Release context
        run: |
          echo "workflow=$GITHUB_WORKFLOW"
          echo "workflow_ref=$GITHUB_WORKFLOW_REF"
          echo "ref=$GITHUB_REF"
          echo "sha=$GITHUB_SHA"
          echo "actor=$GITHUB_ACTOR"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or prepare publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          # Publishing is handled explicitly below for clearer npm/OIDC behavior.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test (publish only)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm --filter wclient build && pnpm --filter wclient test

      - name: Publish wclient to npm (OIDC)
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: packages/wclient
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: false
