name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup npm for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or prepare publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test (publish only)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm --filter wclient build && pnpm --filter wclient test

      - name: Check if wclient version is already published
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: publish_check
        working-directory: packages/wclient
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "wclient@$version" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "wclient@$version is already published. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "wclient@$version is not published yet."
          fi

      - name: Publish wclient to npm (OIDC)
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.publish_check.outputs.should_publish == 'true'
        working-directory: packages/wclient
        run: npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: false
